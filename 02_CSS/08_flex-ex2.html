<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box {
        text-align: center;
        line-height: 50px;
        box-sizing: border-box;
        flex-grow: 1;
        background-color: orange;
      }

      .parent {
        display: flex;

        width: 700px;
        height: 50px;
        background-color: #ccc;
      }

      .box:nth-child(2n) {
        background-color: skyblue;
      }

      .box:first-child {
        border-radius: 30px 0 0 30px;
      }

      .box:last-child {
        border-radius: 0 30px 30px 0;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
      <div class="box">4</div>
      <div class="box">5</div>
      <div class="box">6</div>
      <div class="box">7</div>
    </div>
  </body>
</html>
