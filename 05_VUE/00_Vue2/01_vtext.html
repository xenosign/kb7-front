<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <h2>{{ message }}</h2>
    </div>
    <script>
      Vue.createApp({
        name: 'App',
        data() {
          return {
            message: 'Hello, Vue2 World!',
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
