<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Todo</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
      .completed {
        text-decoration: line-through;
      }
    </style>
  </head>
  <body>
    <div id="app">
      할 일 <input type="text" v-model="todo" v-on:keyup.enter="addTodo" />
      <button @click="addTodo">추가</button>

      <h2>할 일 목록</h2>
      <ul>
        <li
          v-for="(todo, index) in todolist"
          :key="index"
          :class="todo.completed ? 'completed' : ''"
          @click="toggleCompleted(todo.id)"
        >
          <!-- <input type="checkbox" v-model="todo.completed" /> -->
          {{ todo.todo }}
          <button @click.stop="deleteTodo(todo.id)">삭제</button>
        </li>
      </ul>
    </div>
    <script>
      let now = Date.now();
      Vue.createApp({
        name: 'App',
        data() {
          return {
            todo: '',
            todolist: [
              { id: now, todo: '자전거 타기', completed: false },
              { id: now + 1, todo: '딸과 공원 산책', completed: true },
              { id: now + 2, todo: '일요일 애견 카페', completed: false },
              { id: now + 3, todo: 'Vue 원고 집필', completed: false },
            ],
          };
        },
        methods: {
          addTodo() {
            if (this.todo.trim() === '') return (this.todo = '');

            this.todolist.push({
              id: Date.now(),
              todo: this.todo,
              completed: false,
            });

            this.todo = '';
          },

          deleteTodo(id) {
            this.todolist = this.todolist.filter((item) => item.id !== id);
          },

          toggleCompleted(id) {
            const target = this.todolist.find((item) => item.id === id);

            if (target) {
              target.completed = !target.completed;
            }
          },
        },
      }).mount('#app');
    </script>
  </body>
</html>
