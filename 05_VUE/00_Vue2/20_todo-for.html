<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Todo</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
      .completed {
        text-decoration: line-through;
      }
    </style>
  </head>
  <body>
    <div id="app">
      할 일 <input type="text" v-model="todo" v-on:keyup.enter="addTodo" />
      <button @click="addTodo">추가</button>

      <h2>할 일 목록</h2>
      <ul>
        <li
          v-for="(todo, index) in todolist"
          :key="index"
          :class="todo.completed ? 'completed' : ''"
          @click="toggleCompleted(todo.id)"
        >
          <!-- <input type="checkbox" v-model="todo.completed" /> -->
          {{ todo.todo }}
          <button @click.stop="deleteTodo(todo.id)">삭제</button>
        </li>
      </ul>
    </div>
    <script>
      let now = new Date().getTime();
      Vue.createApp({
        name: 'App',
        data() {
          return {
            todo: '',
            todolist: [
              { id: now, todo: '자전거 타기', completed: false },
              { id: now + 1, todo: '딸과 공원 산책', completed: true },
              { id: now + 2, todo: '일요일 애견 카페', completed: false },
              { id: now + 3, todo: 'Vue 원고 집필', completed: false },
            ],
          };
        },
        methods: {
          addTodo() {
            if (this.todo.trim() === '') return (this.todo = '');

            this.todolist.push({
              id: new Date().getTime(),
              todo: this.todo,
              completed: false,
            });

            this.todo = '';
          },
          deleteTodo(id) {
            let delIndex = -1;

            for (let i = 0; i < this.todolist.length; i++) {
              if (id === this.todolist[i].id) delIndex = i;
            }

            if (delIndex !== -1) this.todolist.splice(delIndex, 1);
          },

          toggleCompleted(id) {
            let toggleIndex = 0;

            for (let i = 0; i < this.todolist.length; i++) {
              if (id === this.todolist[i].id)
                this.todolist[i].completed = !this.todolist[i].completed;
            }
          },
        },
      }).mount('#app');
    </script>
  </body>
</html>
