<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <button onclick="showToday()">onclick</button>
    <button id="listener">eventListener</button>
    <script>
      const today = new Date();

      const showToday = () => {
        console.log(today);
      };

      const listenerBtn = document.getElementById("listener");
      listenerBtn.addEventListener("click", showToday);
    </script>
  </body>
</html>
